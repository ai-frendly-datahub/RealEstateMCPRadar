category_name: realestate_mcp
display_name: 부동산 MCP 레이더
data_quality:
  priority: P1
  primary_motion: conversion
  weakest_dimension: traceability
  quality_outputs:
    freshness_report: reports/realestate_mcp_quality.json
    dated_freshness_report_pattern: reports/realestate_mcp_YYYYMMDD_quality.json
    tracked_event_models:
    - mcp_directory_entry
    - mcp_tool_result
    - linked_repository_metadata
    - risk_scope_signal
  event_models:
    mcp_directory_entry:
      date_fields:
      - collected_at
      required_fields:
      - repository
      - source_section
      - source_url
    mcp_tool_result:
      date_fields:
      - collected_at
      required_fields:
      - repository
      - tool_name
      - source_url
    linked_repository_metadata:
      date_fields:
      - pushed_at
      - collected_at
      required_fields:
      - repository
      - archived
      - license
    risk_scope_signal:
      date_fields:
      - collected_at
      required_fields:
      - repository
      - risk_scope
      - evidence_url
  canonical_keys:
    mcp_project:
    - repository
    - provider
    - mcp_domain
  freshness_sla:
    directory_days: 7
    repository_metadata_days: 7
  quality_gates:
  - awesome list는 community seed source로만 사용하고 보안성을 보증하지 않는다
  - linked repository metadata로 archived/license/docs 여부를 교차 검증한다
  - 주문, 메시지, 일정 등록, 위치, 문서 처리 도구는 high-risk signal로 분리한다
source_backlog:
  operational_candidates:
  - id: github_repository_metadata
    name: GitHub repository metadata enrichment
    signal_type: linked_repository_metadata
    activation_gate: rate-limit handling, repository canonicalization, and archived/license
      mapping
  - id: mcp_registry_crosscheck
    name: MCP registry cross-check
    signal_type: mcp_registry_presence
    activation_gate: registry API availability and canonical package mapping
  - id: security_advisory_crosscheck
    name: GitHub security advisory cross-check
    signal_type: security_risk
    activation_gate: advisory API coverage and false positive handling
